name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        
    - name: Run code formatting check (black)
      run: black --check .
      
    - name: Run code linting (ruff)
      run: ruff check .
      
    - name: Run Python unit tests
      run: pytest tests/python/

  julia-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Julia
      uses: julia-actions/setup-julia@v1
      with:
        version: '1.10'
        
    - name: Install Julia dependencies
      run: julia --project -e 'using Pkg; Pkg.instantiate()'
      
    - name: Run Julia tests
      run: julia --project=. tests/julia/runtests.jl

  deploy-docs:
    runs-on: ubuntu-latest
    needs: [python-tests, julia-tests]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mkdocs-material mkdocs-jupyter

    - name: Copy notebooks to docs/
      run: python build_site.py

    - name: Build MkDocs site
      run: python -m mkdocs build --site-dir _site

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  warm-binder:
    runs-on: ubuntu-latest
    needs: [python-tests, julia-tests]
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Pre-warm Binder image cache
      # Kicks off a repo2docker build for this commit so the image is
      # already cached by the time a real visitor clicks "Activar
      # Python/Julia" on the site. BinderHub keeps building server-side
      # even after the client disconnects, so it's fine to not wait for
      # the full build (which can take several minutes) here.
      run: |
        curl -s -m 60 -N "https://mybinder.org/build/gh/${{ github.repository }}/main" > /dev/null || true
